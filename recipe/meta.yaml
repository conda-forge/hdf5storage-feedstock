{% set name = "hdf5storage" %}
{% set version = "0.2.1" %}
{% set sha256 = "a8b657e6e3c07bd35d44814d2e1dc649e2de199e77ecca5efeed5399e9ee8326" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.zip
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python >=2.6
    - setuptools

  run:
    - python >=2.6
    - h5py >=2.3
    - numpy
    - scipy

test:
  imports:
    - hdf5storage

about:
  home: https://github.com/frejanordsiek/hdf5storage
  license: BSD-2-Clause
  license_file: COPYING.txt
  summary: Utilities to read/write Python types to/from HDF5 files, including MATLAB v7.3 MAT files.
  doc_url: http://pythonhosted.org/hdf5storage
  dev_url: https://github.com/frejanordsiek/hdf5storage

extra:
  recipe-maintainers:
    - jakirkham
