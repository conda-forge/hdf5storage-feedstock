{% set name = "hdf5storage" %}
{% set version = "0.1.19.post1" %}
{% set sha256 = null %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  git_url: https://github.com/frejanordsiek/hdf5storage.git
  git_rev: 7ee2a96de134b44beaa79c3a11c559f9ac87c5a6

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python >=3.7,<3.13
    - setuptools
    - numpy
    - scipy

  run:
    - python >=3.7,<3.13
    - h5py >=2.3
    - numpy
    - scipy

test:
  imports:
    - hdf5storage
  commands:
    - python -c "import hdf5storage; print(hdf5storage.__version__)"

about:
  home: https://github.com/frejanordsiek/hdf5storage
  license: BSD-2-Clause
  license_file: COPYING.txt
  summary: Utilities to read/write Python types to/from HDF5 files, including MATLAB v7.3 MAT files.
  doc_url: http://pythonhosted.org/hdf5storage
  dev_url: https://github.com/frejanordsiek/hdf5storage

extra:
  recipe-maintainers:
    - jakirkham
